<div class="container">

  <div class="display-4 text-center">Cadastro de Professor</div>
  
  

  <form [formGroup]="formGroupProfessor">
   
   <div class="mb-3">
      <label for="inputName" class="form-label">Nome</label>
      <input formControlName="name"  type="text" class="form-control" id="inputName">
    </div>
    
    <div class="mb-3">
      <label for="inputemail" class="form-label">Email</label>
      <input formControlName="email" type="text" class="form-control" id="inputemail">
    </div>

    <div class="mb-3">
      <label for="inputarea" class="form-label">Area</label>
      <input formControlName="area" type="text" class="form-control" id="inputarea">
    </div>

        <div class="mb-3">
      <label for="inputDegree" class="form-label">Graduação</label>
      <input formControlName="degree"type="text" class="form-control" id="inputDegree">
    </div>
  
    <button *ngIf="!isEditing"   type="submit" class="btn btn-primary" (click)="save()">Salvar</button>
    <button *ngIf="isEditing"   type="submit" class="btn btn-primary"  (click)="update()">Atualizar</button>

    
  </form>


<div class="display-4 text-center">Professores Cadastrados</div>
Total de professores: {{products.length}}

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
  <div class="col" *ngFor="let p of products">
    <div class="card h-100">
      <img src="/img/professor.jpg" class="card-img-top" alt="Imagem do professor">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{p.name}}</h5>
        <h6 class="card-subtitle mb-2 text-muted">Email: {{p.email}}</h6>
        <p class="card-text">
          Área: {{p.area}} <br>
          Graduação: {{p.degree}}
        </p>
        <div class="mt-auto">
          <button class="btn btn-danger me-2" (click)="onClickDelete(p)">
            Remover
          </button>
          <button class="btn btn-secondary" (click)="onClickUpdate(p)">
            Alterar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
   
    
 




</div>
